apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments-deployment
  namespace: app-cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comments
  template:
    metadata:
      labels:
        app: comments
    spec:
      containers:
        - name: comments
          image: manjivija/comments-service:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: comments-service
  namespace: app-cicd
spec:
  selector:
    app: comments
  ports:
    - port: 8000
      targetPort: 8000
