apiVersion: apps/v1
kind: Deployment
metadata:
  name: posts-deployment
  namespace: app-cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posts
  template:
    metadata:
      labels:
        app: posts
    spec:
      containers:
        - name: posts
          image: manjivija/posts-service:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: posts-service
  namespace: app-cicd
spec:
  selector:
    app: posts
  ports:
    - port: 8000
      targetPort: 8000
