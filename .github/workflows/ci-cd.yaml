name: OTEL CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2

      - name: Build & push posts-service
        uses: docker/build-push-action@v4
        with:
          context: ./posts
          push: true
          tags: manjivija/posts-service:latest

      - name: Build & push comments-service
        uses: docker/build-push-action@v4
        with:
          context: ./comments
          push: true
          tags: manjivija/comments-service:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0
      - name: Apply manifests
        run: kubectl apply -n app-cicd -f k8s/
